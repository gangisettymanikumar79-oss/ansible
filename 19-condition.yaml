- name: demo on filters
  hosts: local
  connection: local
  vars:
    topics: "Linux, Ansible, Terraform, Git"
    full-name: "manikuamr"
  topmap:
    name: Ansible
    project: roboshop
    environment: dev
    taglist:
      - { key: "name", value: "Ansible" }
      - { key: "project", value: "roboshop" }
      - { key: "environment", value: "dev" }
 

    
  tasks:
  - name: Convert string to list
    debug:
      msg: "{{ topics | split(',') }}"
  tasks:
  - name: default value if variable not defined
    debug:
      msg: "{{ Greeting | default('Good Moring') }}"
  tasks:
  - name: map to list
    debug:
      msg: "{{tagMap | dict2items }}"
 
  
      
    
    
  
  

  
      
   
    

  
 
      

  


