- name: demo on filters
  hosts: local
  connection: local
  vars:
    topices: "Linux, ansible,docker, git"
    
    tagMap:
     name: ansible
     project: roboshop
     environment: dev
    full_name: "Manikumar Gangisetty"
    tagslist: [
        {
            "key": "name",
            "value": "ansible"
        },
        {
            "key": "project",
            "value": "roboshop"
        },
        {
            "key": "environment",
            "value": "dev"
        }
    ]

       

      
  tasks: 
  - name: convert to strong List
    ansible.builtin.debug:
      msg: " Topices: {{ topices | split(',') }}"

  - name: set default value 
    ansible.builtin.debug:
      msg: "{{ Greeting | default('Good Morning') }}"
       
  - name: Convert map to list
    ansible.builtin.debug:
      msg: "{{ tagMap | dict2items }}"
  
  - name: Convert map to list
    ansible.builtin.debug:
      msg: "{{ tagslist | items2dict  }}"

  - name: Convert string to uppercase
    ansible.builtin.debug:
      msg: "{{ 'hello world' | upper  }}"

  - name: Convert string to lowercase
    ansible.builtin.debug:
      msg: "{{ 'hello world' | lower }}"



  

    

    
    
  
  
      

    

  
