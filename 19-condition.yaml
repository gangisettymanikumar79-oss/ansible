- name: demo on filters
  hosts: local
  connection: local
  vars:
    topics: "Linux, Shell, Ansible, Terraform"
    full_name: "Manikumar kumar"
    ip-address: "172.31.22.145"
    tagmap:
      name: Ansible
      project: roboshop
      environment: dev
    tagsList:
      - { key: "name", value: "Ansible" }
      - { key: "project", value: "roboshop" }
      - { key: "environment", value: "dev" }
  tasks:
    - name: string to list
      ansible.builtin.debug:
        msg: "{{ topics | split(',') }}"

    - name: default value if variable not defined
      ansible.builtin.debug:
        msg: "{{ GREETING | default('Good Morning') }}"
   
    

  
 
      

  


