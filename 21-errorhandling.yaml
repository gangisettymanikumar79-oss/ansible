- name : demo on Error Handling
  hosts: local
  connection: local
  
  tasks: 
  - name: check if roboshop user exists
    ansible.builtin.command: id roboshop
    register: user_output
    ignore_errors: yes

  - name: user status
  ansible.builtin.debug:
    msg: "Return code is {{ user_output.rc }}"
    
  
