- name: demo if else condition
  hosts: localhost
  gather_facts: false
  vars:
  is_live_sessions: 5
  tasks:
  - name: more than 5 is_live_sessions
    ansible.builtin.debug:
      msg: "yes,ansible took more sessions 5"
      when: is_live_sessions >5
  tasks:
  - name: more than 5 is_live_sessions
    ansible.builtin.debug:
      msg: "yes,ansible took more sessions 5"
      when: is_live_sessions <= 5

 
